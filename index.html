<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Special Offer For Raj Nandini ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Dancing+Script:wght@600;700&display=swap" rel="stylesheet">

<style>

body {
    margin: 0;
    padding: 0;
    min-height: 100dvh; /* FIXED */
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(45deg, #ff6b81, #ff9ff3);
    font-family: 'Playfair Display', serif;
    overflow-x: hidden; /* FIXED */
    padding: 15px;
}

.container {
    text-align: center;
    color: white;
    padding: 20px;
    width: 100%;
    max-width: 500px; /* RESPONSIVE */
    position: relative; /* IMPORTANT */
}

h1 {
    font-size: clamp(1.4rem, 3.5vw, 2.2rem); /* RESPONSIVE */
    animation: fadeIn 2s ease-in-out;
    line-height: 1.5;
}

.soft-text {
    font-family: 'Dancing Script', cursive;
    font-size: clamp(1.8rem, 4vw, 2rem); /* RESPONSIVE */
    font-weight: 700;
    margin-bottom: 20px;
    color: #ffffff;
    text-shadow: 
        0 0 8px rgba(255,255,255,0.8),
        0 0 15px rgba(255,182,193,0.9),
        0 0 25px rgba(255,105,180,0.8);
    letter-spacing: 1px;
}

.buttons {
    margin-top: 30px;
}

button {
    padding: 12px 25px;
    font-size: clamp(14px, 2.5vw, 18px); /* RESPONSIVE */
    border: none;
    border-radius: 25px;
    cursor: pointer;
    margin: 10px;
    transition: 0.3s;
}

#yesBtn {
    background-color: #2ed573;
    color: white;
}

#noBtn {
    background-color: #ff4757;
    color: white;
    position: fixed; /* FIXED for responsiveness */
}

button:hover {
    transform: scale(1.1);
}

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(-20px); }
    to { opacity: 1; transform: translateY(0); }
}

.heart {
    position: fixed;
    animation: float 5s linear infinite;
}

@keyframes float {
    from { transform: translateY(100vh); opacity: 1; }
    to { transform: translateY(-10vh); opacity: 0; }
}

/* Small Screen Extra Fix */
@media (max-width: 480px) {
    .container {
        padding: 15px;
    }
}

</style>
</head>

<body>

<div class="container">
    
    <div class="soft-text">
        Raj Nandini… ❤️ 
    </div>

    <h1>
        💖 Special Lifetime Offer 💖 <br><br>
        Kya tum meri life ki <br>
        <b>Lifetime Membership</b> accept karogi?
    </h1>

    <div class="buttons">
        <button id="yesBtn">Accept Forever 💍</button>
        <button id="noBtn">Decline ❌</button>
    </div>
</div>

<audio id="bgMusic" src="MaroonColorSadiya.mp3" loop></audio>

<script>

var noBtn = document.getElementById("noBtn");
var yesBtn = document.getElementById("yesBtn");
var bgMusic = document.getElementById("bgMusic");

var noClickCount = 0;

/* Desktop */
noBtn.addEventListener("mouseover", moveButton);

/* Mobile */
noBtn.addEventListener("touchstart", function(e){
    e.preventDefault();
    moveButton();
});

/* YES Button */
yesBtn.addEventListener("click", function() {

    bgMusic.play().catch(function(error){});

    document.querySelector(".container").innerHTML =
        "<h1 style='font-size:clamp(1.6rem,4vw,2.8rem);'>🎉 Membership Activated Successfully ❤️<br><br>Welcome to Forever 😍</h1>";

    createHearts();
});

function moveButton() {

    noClickCount++;

    var btnWidth = noBtn.offsetWidth;
    var btnHeight = noBtn.offsetHeight;

    var maxX = window.innerWidth - btnWidth - 10;
    var maxY = window.innerHeight - btnHeight - 10;

    var x = Math.random() * maxX;
    var y = Math.random() * maxY;

    noBtn.style.left = x + "px";
    noBtn.style.top = y + "px";

    if(noClickCount === 5) {
        alert("Lifetime offer itni easily miss nahi hota 😏❤️");
    }

    if(noClickCount > 8) {
        noBtn.style.transition = "0.05s";
    }
}

function createHearts() {
    setInterval(function() {
        var heart = document.createElement("div");
        heart.classList.add("heart");
        heart.innerHTML = "❤️";
        heart.style.left = Math.random() * 100 + "vw";
        heart.style.fontSize = Math.random() * 20 + 20 + "px";
        document.body.appendChild(heart);

        setTimeout(function() {
            heart.remove();
        }, 5000);
    }, 300);
}

</script>

</body>
</html>
