<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Special Offer For Raj Nandini ❤️</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Dancing+Script:wght@600;700&display=swap" rel="stylesheet">
<style>
body {
    margin: 0;
    padding: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(45deg, #ff6b81, #ff9ff3);
    font-family: 'Playfair Display', serif;
    overflow: hidden;
}

.container {
    text-align: center;
    color: white;
    padding: 20px;
}

h1 {
    font-size: 2.2rem;
    animation: fadeIn 2s ease-in-out;
}

.soft-text {
    font-family: 'Dancing Script', cursive;
    font-size: 2rem;
    font-weight: 700;
    margin-bottom: 20px;
    color: #ffffff;
    text-shadow: 
        0 0 8px rgba(255,255,255,0.8),
        0 0 15px rgba(255,182,193,0.9),
        0 0 25px rgba(255,105,180,0.8);
    letter-spacing: 1px;
}

.buttons {
    margin-top: 30px;
}

button {
    padding: 12px 25px;
    font-size: 18px;
    border: none;
    border-radius: 25px;
    cursor: pointer;
    margin: 10px;
    transition: 0.3s;
}

#yesBtn {
    background-color: #2ed573;
    color: white;
}

#noBtn {
    background-color: #ff4757;
    color: white;
    position: absolute;
}

button:hover {
    transform: scale(1.1);
}

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(-20px); }
    to { opacity: 1; transform: translateY(0); }
}

.heart {
    position: absolute;
    color: white;
    animation: float 5s linear infinite;
}

@keyframes float {
    from { transform: translateY(100vh); opacity: 1; }
    to { transform: translateY(-10vh); opacity: 0; }
}
</style>
</head>

<body>

<div class="container">
    
    <div class="soft-text">
        Raj Nandini… ❤️ 
    </div>

    <h1>
        💖 Special Lifetime Offer 💖 <br><br>
        Kya tum meri life ki <br>
        <b>Lifetime Membership</b> accept karogi?
    </h1>

    <div class="buttons">
        <button id="yesBtn">Accept Forever 💍</button>
        <button id="noBtn">Decline ❌</button>
    </div>
</div>

<!-- 🎵 Background Music -->
<audio id="bgMusic" src="MaroonColorSadiya.mp3" loop></audio>

<script>
var noBtn = document.getElementById("noBtn");
var yesBtn = document.getElementById("yesBtn");
var bgMusic = document.getElementById("bgMusic");

var noClickCount = 0;

/* Desktop */
noBtn.addEventListener("mouseover", moveButton);

/* Mobile */
noBtn.addEventListener("touchstart", function(e){
    e.preventDefault();
    moveButton();
});

/* YES Button */
yesBtn.addEventListener("click", function() {

    bgMusic.play().catch(function(error){
        console.log("Music blocked:", error);
    });

    document.querySelector(".container").innerHTML =
        "<h1 style='color:white;font-size:2.8rem;'>🎉 Membership Activated Successfully ❤️<br><br>Welcome to Forever 😍</h1>";

    createHearts();
});

function moveButton() {
    noClickCount++;

    var x = Math.random() * (window.innerWidth - 120);
    var y = Math.random() * (window.innerHeight - 60);

    noBtn.style.left = x + "px";
    noBtn.style.top = y + "px";

    if(noClickCount === 5) {
        alert("Lifetime offer itni easily miss nahi hota 😏❤️");
    }

    if(noClickCount > 8) {
        noBtn.style.transition = "0.05s";
    }
}

function createHearts() {
    setInterval(function() {
        var heart = document.createElement("div");
        heart.classList.add("heart");
        heart.innerHTML = "❤️";
        heart.style.left = Math.random() * 100 + "vw";
        heart.style.fontSize = Math.random() * 20 + 20 + "px";
        document.body.appendChild(heart);

        setTimeout(function() {
            heart.remove();
        }, 5000);
    }, 300);
}

</script>

</body>
</html>
